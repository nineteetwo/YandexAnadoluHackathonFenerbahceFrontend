<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhanarAi - Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="time-night weather-clear">
    <div id="sky-gradient"></div>
    <div id="clouds-layer"></div>
    <div id="fog-layer"></div>
    <canvas id="weather-canvas"></canvas>
    <div id="lightning-layer"></div>

    <nav class="navbar auth-navbar">
        <div class="nav-left">
            <span class="logo-font nav-logo" onclick="window.location.href='index.html'">PhanarAi</span>
        </div>
        <div class="nav-right" id="nav-right">
            <select class="glass-btn" id="lang-select">
                <option value="en">EN</option>
                <option value="tr">TR</option>
                <option value="ru">RU</option>
            </select>
        </div>
    </nav>

    <main class="center-content">
        <div class="auth-container glass-panel">
            <h2 class="logo-font auth-title" id="txt-auth-title-up">Sign up</h2>
            
            <div class="input-group">
                <label id="txt-name-label">Full Name</label>
                <input type="text" id="name-input" placeholder="John Doe">
            </div>

            <div class="input-group">
                <label id="txt-email-label">Email Address</label>
                <input type="email" id="email-input" placeholder="mail@example.com">
            </div>
            
            <div class="input-group">
                <label id="txt-pass-label">Password</label>
                <input type="password" id="pass-input" placeholder="••••••••">
            </div>

            <div class="input-group">
                <label id="txt-pass-confirm-label">Confirm Password</label>
                <input type="password" id="pass-confirm-input" placeholder="••••••••">
            </div>
            
            <button class="auth-submit" id="btn-submit-signup">Sign up</button>
            
            <div class="auth-link">
                <span id="txt-has-account">Already have an account?</span> 
                <a href="login.html" id="link-signin">Sign in</a>
            </div>
        </div>
    </main>

    <script src="weather.js"></script>
    <script src="main.js"></script>
    <script src="auth.js"></script>
</body>
</html>
