<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhanarAi - Login Test</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="time-night weather-clear">
    <div id="sky-gradient"></div>
    <div id="clouds-layer"></div>
    <div id="fog-layer"></div>
    <canvas id="weather-canvas"></canvas>
    <div id="lightning-layer"></div>

    <nav class="navbar auth-navbar">
        <div class="nav-left">
            <span class="logo-font nav-logo" onclick="window.location.href='index.html'" style="cursor: pointer;">PhanarAi</span>
        </div>
        <div class="nav-right" id="nav-right">
            <select class="glass-btn" id="lang-select">
                <option value="en">EN</option>
                <option value="tr">TR</option>
                <option value="ru">RU</option>
            </select>
        </div>
    </nav>

    <main class="center-content">
        <div class="auth-container glass-panel">
            <h2 class="logo-font auth-title" id="txt-auth-title">Sign in</h2>
            
            <div class="input-group">
                <label id="txt-email-label">Email Address</label>
                <input type="email" id="email-input" placeholder="mail@example.com">
            </div>
            
            <div class="input-group">
                <label id="txt-pass-label">Password</label>
                <input type="password" id="pass-input" placeholder="••••••••">
            </div>
            
            <button class="auth-submit" id="btn-submit-login">Sign in</button>
            
            <div class="auth-link">
                <span id="txt-no-account">Don't have an account?</span> 
                <a href="signup.html" id="link-signup">Sign up</a>
            </div>
        </div>
    </main>

    <div class="dev-menu glass-panel">
        <label style="font-size: 12px; opacity: 0.8;">Atmosphere Test</label>
        <select id="dev-time">
            <option value="sunrise">🌅 Sunrise</option>
            <option value="morning">☀️ Morning</option>
            <option value="noon">🌞 Noon</option>
            <option value="sunset">🌇 Sunset</option>
            <option value="evening">🌆 Evening</option>
            <option value="night" selected>🌙 Night</option>
        </select>
        <select id="dev-weather">
            <option value="clear" selected>Clear / Starry</option>
            <option value="clouds">Cloudy</option>
            <option value="rain">Rainy</option>
            <option value="heavy-rain">Heavy Rain</option>
            <option value="snow">Snowy</option>
            <option value="thunder">Thunderstorm</option>
            <option value="fog">Foggy</option>
        </select>
    </div>

    <script src="weather.js"></script>
    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const devTime = document.getElementById('dev-time');
            const devWeather = document.getElementById('dev-weather');
            setTimeout(() => applyDevSettings(), 150);
            devTime.addEventListener('change', applyDevSettings);
            devWeather.addEventListener('change', applyDevSettings);
            function applyDevSettings() {
                const time = devTime.value;
                const weather = devWeather.value;
                document.body.className = `time-${time} weather-${weather}`;
                if (window.setWeatherEffect) window.setWeatherEffect(weather);
            }
        });
    </script>
</body>
</html>
